<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Iniciar Sesión - Soldaduras Zamora</title>
    <!-- Tailwind CSS CDN -->
    <link rel="stylesheet" href="/style.css" />
  </head>
  <body class="bg-zinc-800 min-h-screen flex items-center justify-center p-4">
    <!-- Tarjeta Principal de Login -->
    <div
      class="bg-zinc-900 p-8 rounded-2xl border border-zinc-700 shadow-2xl w-full max-w-md flex flex-col items-center gap-6"
    >
      <!-- Logo con borde amarillo industrial -->
      <img
        src="/media/logo-soldadura.jpg"
        alt="Soldaduras Zamora"
        class="w-28 h-28 rounded-full object-cover border-4 border-amber-500 shadow-[0_0_15px_rgba(245,158,11,0.2)]"
      />

      <!-- Encabezado del Login -->
      <div class="text-center">
        <h1
          class="font-sans font-black text-2xl tracking-widest text-white uppercase"
        >
          Ingresar
        </h1>
        <p
          class="font-mono text-[10px] text-zinc-400 mt-1 uppercase tracking-wider"
        >
          Control de Acceso a Clientes
        </p>
      </div>

      <!-- Formulario de Login (Apunta a tu ruta de autenticación en Express) -->
      <form action="/login" method="POST" class="w-full flex flex-col gap-4">
        <!-- Campo: Correo Electrónico -->
        <div class="flex flex-col gap-1.5">
          <label
            for="correo"
            class="font-mono text-xs text-zinc-300 uppercase tracking-wider"
            >Correo Electrónico</label
          >
          <input
            type="email"
            id="correo"
            name="correo"
            placeholder="usuario@correo.com"
            required
            class="bg-zinc-950 text-white placeholder-zinc-600 font-mono text-sm px-4 py-2.5 rounded-lg border border-zinc-700 outline-none focus:border-amber-400 focus:ring-1 focus:ring-amber-400 transition-all"
          />
        </div>

        <!-- Campo: Contraseña -->
        <div class="flex flex-col gap-1.5 w-full">
          <label
            for="password"
            class="font-mono text-xs text-zinc-300 uppercase tracking-wider"
            >Contraseña</label
          >
          <input
            type="password"
            id="password"
            name="password"
            placeholder="••••••••"
            required
            class="w-full bg-zinc-950 text-white placeholder-zinc-600 font-mono text-sm px-4 py-2.5 rounded-lg border border-zinc-700 outline-none focus:border-amber-400 focus:ring-1 focus:ring-amber-400 transition-all"
          />
        </div>

        <!-- Botón de Ingreso Principal -->
        <button
          type="submit"
          class="font-sans font-black bg-amber-500 hover:bg-amber-600 text-zinc-950 py-3 px-6 rounded-lg w-full uppercase tracking-widest shadow-[0_4px_20px_rgba(245,158,11,0.15)] transition-all mt-2"
        >
          Entrar al Sistema
        </button>

        <!-- Enlace para ir al Registro que hicimos antes -->
        <p class="font-mono text-xs text-center text-zinc-400 mt-2">
          ¿Eres nuevo?
          <a href="/signup" class="text-amber-400 hover:underline"
            >Regístrate aquí</a
          >
        </p>
      </form>
    </div>
  </body>
</html>

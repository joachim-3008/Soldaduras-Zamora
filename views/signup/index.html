<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <title>Mi Proyecto</title>
    <link rel="stylesheet" href="/style.css" />
  </head>
  <body class="bg-zinc-800 min-h-screen flex items-center justify-center p-4">
    <!-- Tarjeta de registro comercial -->
    <div
      class="bg-zinc-900 p-8 rounded-2xl border border-zinc-700 shadow-2xl w-full max-w-md flex flex-col items-center gap-6"
    >
      <!-- El Logo de tu marca con el borde amarillo industrial resaltando -->
      <img
        src="/media/logo-soldadura.jpg"
        alt="Soldaduras Zamora"
        class="w-28 h-28 rounded-full object-cover border-4 border-amber-500 shadow-[0_0_15px_rgba(245,158,11,0.2)]"
      />

      <!-- Títulos comerciales -->
      <div class="text-center">
        <h1
          class="font-sans font-black text-2xl tracking-widest text-white uppercase"
        >
          Crear Cuenta
        </h1>
        <p
          class="font-mono text-[10px] text-zinc-400 mt-1 uppercase tracking-wider"
        >
          Tienda Oficial de Herramientas y Suministros
        </p>
      </div>

      <!-- Formulario de registro para la tienda -->
      <form class="w-full flex flex-col gap-4">
        <!-- Campo: Nombre -->
        <div class="flex flex-col gap-1.5">
          <label
            class="font-mono text-xs text-zinc-300 uppercase tracking-wider"
            >Nombre Completo / Razón Social</label
          >
          <input
            type="text"
            placeholder="Ej: Juan Pérez o Inversiones Z, C.A."
            class="bg-zinc-950 text-white placeholder-zinc-600 font-mono text-sm px-4 py-2.5 rounded-lg border border-zinc-700 outline-none focus:border-amber-400 focus:ring-1 focus:ring-amber-400 transition-all"
          />
        </div>

        <!-- Campo: Correo -->
        <div class="flex flex-col gap-1.5">
          <label
            class="font-mono text-xs text-zinc-300 uppercase tracking-wider"
            >Correo Electrónico</label
          >
          <input
            type="email"
            placeholder="usuario@correo.com"
            class="bg-zinc-950 text-white placeholder-zinc-600 font-mono text-sm px-4 py-2.5 rounded-lg border border-zinc-700 outline-none focus:border-amber-400 focus:ring-1 focus:ring-amber-400 transition-all"
          />
        </div>

        <!-- Campo: Contraseña -->
        <div class="flex flex-col gap-1.5">
          <label
            class="font-mono text-xs text-zinc-300 uppercase tracking-wider"
            >Contraseña</label
          >
          <input
            type="password"
            placeholder="••••••••"
            class="bg-zinc-950 text-white placeholder-zinc-600 font-mono text-sm px-4 py-2.5 rounded-lg border border-zinc-700 outline-none focus:border-amber-400 focus:ring-1 focus:ring-amber-400 transition-all"
          />
        </div>

        <div class="flex flex-col gap-1.5">
          <label
            class="font-mono text-xs text-zinc-300 uppercase tracking-wider"
            >Comfirmar Contraseña</label
          >
          <input
            type="password"
            placeholder="••••••••"
            class="bg-zinc-950 text-white placeholder-zinc-600 font-mono text-sm px-4 py-2.5 rounded-lg border border-zinc-700 outline-none focus:border-amber-400 focus:ring-1 focus:ring-amber-400 transition-all"
          />
        </div>

        <!-- Botón Registrar (Llamativo estilo EPA/Damasco pero con el toque de herrería) -->
        <button
          type="submit"
          class="font-sans font-black bg-amber-500 hover:bg-amber-600 text-zinc-950 py-3 px-6 rounded-lg w-full uppercase tracking-widest shadow-[0_4px_20px_rgba(245,158,11,0.15)] transition-all mt-2"
        >
          Registrarme
        </button>

        <!-- Link para volver al Login -->
        <p class="font-mono text-xs text-center text-zinc-400 mt-2">
          ¿Ya tienes cuenta?
          <a href="/login" class="text-amber-400 hover:underline"
            >Inicia sesión</a
          >
        </p>
      </form>
    </div>
  </body>
</html>
